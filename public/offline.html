<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BrokerBox Offline</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#070b16;color:#fff;display:flex;min-height:100vh;align-items:center;justify-content:center}
    .card{max-width:520px;padding:32px;border:1px solid #1f2937;border-radius:20px;background:#111827;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    h1{margin:0 0 12px;font-size:32px}
    p{margin:0 0 10px;color:#cbd5e1;line-height:1.5}
    .btn{display:inline-block;margin-top:16px;padding:12px 16px;background:#14b8a6;color:#041014;text-decoration:none;border-radius:12px;font-weight:700}
  </style>
</head>
<body>
  <div class="card">
    <h1>BrokerBox is offline</h1>
    <p>You can open the app shell, but live CRM data needs a connection.</p>
    <p>Reconnect to continue editing borrowers, deals, lenders, and documents.</p>
    <a class="btn" href="/">Try again</a>
  </div>
</body>
</html>
